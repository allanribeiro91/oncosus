# Configuração central do fine-tuning OncoSUS
# Altere aqui sem precisar mexer no código Python

model:
  base_model: "BioMistral/BioMistral-7B"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  output_dir: "finetuning/output/checkpoints"
  max_steps: 200
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.00002  
  max_length: 1024        
  eval_steps: 25
  save_steps: 25
  warmup_steps: 10

data:
  train_path: "data/datasets/synthetic_qa_dataset/dataset_treino.json"
  val_path:   "data/datasets/synthetic_qa_dataset/dataset_validacao.json"
  val_ratio:  0.10

system_prompt: >
  Assistente oncológico com PCDTs e manuais do INCA/SUS.
  Use diretrizes SBOC/ASCO/ESMO. Nunca prescreva diretamente.